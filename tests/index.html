<h1>StableMate — Test Suite</h1>
<div class="version">v0.3 · Riders, injury system, one-ride-per-day rule</div>
<div class="section-label">Covers: all v0.2 suites + riders, injury flag, booking constraints, rider-horse assignments</div>

<button class="run-btn" onclick="runAll()">Run All Tests</button>
<div id="results"></div>

<script>
const results = [];

function test(suite, name, fn) {
  results.push({ suite, name, fn, status: 'pending', error: '' });
}
function assert(condition, detail) {
  if (!condition) throw new Error(detail || 'Assertion failed');
}
function assertEquals(a, b, label) {
  if (a !== b) throw new Error(`${label||'assertEquals'}: expected "${b}" got "${a}"`);
}
function assertContains(arr, val, label) {
  if (!arr.includes(val)) throw new Error(`${label||'assertContains'}: "${val}" not found in [${arr.join(', ')}]`);
}

// ── MOCK DATA ──
const mockHorses = [
  { id:1, name:'Thunder',  breed:'Warmblood',    age:9,  owner_id:1, injured:false, notes:'' },
  { id:2, name:'Bella',    breed:'Thoroughbred', age:7,  owner_id:2, injured:false, notes:'' },
  { id:3, name:'Shadow',   breed:'Arabian',      age:12, owner_id:1, injured:true,  notes:'Strained tendon' },
  { id:4, name:'Estella',  breed:'Warmblood',    age:6,  owner_id:2, injured:false, notes:'' },
];

const mockOwners = [
  { id:1, first:'Emily', last:'Carter', email:'emily@example.com', level:'independent' },
  { id:2, first:'James', last:'Wilson', email:'james@example.com', level:'supervised'  },
];

const mockRiders = [
  { id:1, first:'Alex',  last:'Taylor', email:'alex@example.com',  phone:'555-0001', level:'canter',      membership:'monthly' },
  { id:2, first:'Sam',   last:'Blake',  email:'sam@example.com',   phone:'555-0002', level:'jump',        membership:'annual'  },
  { id:3, first:'Casey', last:'Morgan', email:'casey@example.com', phone:'555-0003', level:'lead-line',   membership:'monthly' },
  { id:4, first:'Jordan',last:'Reed',   email:'jordan@example.com',phone:'555-0004', level:'competition', membership:'annual'  },
];

const mockRiderHorses = [
  { id:1, rider_id:1, horse_id:1 },
  { id:2, rider_id:1, horse_id:2 },
  { id:3, rider_id:2, horse_id:1 },
  { id:4, rider_id:3, horse_id:4 },
];

const TODAY = '2026-04-06'; // Monday

const mockBookings = [
  { id:1, horse_id:1, rider_id:1, date:TODAY,      time:'10:00', type:'lesson',           notes:'' },
  { id:2, horse_id:2, rider_id:2, date:TODAY,      time:'13:00', type:'arena-supervised', notes:'' },
  { id:3, horse_id:4, rider_id:null, date:'2026-04-07', time:'09:00', type:'vet',          notes:'' },
];

const mockSchedules = [
  { trainer_name:'Colin',  day_of_week:'Monday',    start_time:'13:00', end_time:'18:00' },
  { trainer_name:'Colin',  day_of_week:'Tuesday',   start_time:'13:00', end_time:'18:00' },
  { trainer_name:'Colin',  day_of_week:'Wednesday', start_time:'13:00', end_time:'18:00' },
  { trainer_name:'Colin',  day_of_week:'Thursday',  start_time:'13:00', end_time:'18:00' },
  { trainer_name:'Janeen', day_of_week:'Monday',    start_time:'13:00', end_time:'18:00' },
  { trainer_name:'Janeen', day_of_week:'Friday',    start_time:'13:00', end_time:'18:00' },
  { trainer_name:'Janeen', day_of_week:'Saturday',  start_time:'09:30', end_time:'14:30' },
  { trainer_name:'Janeen', day_of_week:'Sunday',    start_time:'09:30', end_time:'14:30' },
];

const typeConfig = {
  'lesson':            { label:'Riding Lesson',              supervised:true  },
  'arena-supervised':  { label:'Arena Session (Supervised)', supervised:true  },
  'arena-independent': { label:'Arena Session (Independent)',supervised:false },
  'vet':               { label:'Vet Appointment',            supervised:false },
  'farrier':           { label:'Farrier Visit',              supervised:false },
  'competition':       { label:'Competition Day',            supervised:false },
};

const levelConfig = {
  'lead-line':   { label:'Lead Line'   },
  'walk-trot':   { label:'Walk-Trot'   },
  'canter':      { label:'Canter'      },
  'jump':        { label:'Jump'        },
  'competition': { label:'Competition' },
};

const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// ── APP FUNCTIONS (mirrors v0.3) ──
function getHorse(id)      { return mockHorses.find(h => h.id === id); }
function getOwner(id)      { return mockOwners.find(o => o.id === id); }
function getRider(id)      { return mockRiders.find(r => r.id === id); }
function getOwnerByHorse(hid) { const h = getHorse(hid); return h ? getOwner(h.owner_id) : null; }
function fmtDate(d)        { return d.toISOString().split('T')[0]; }
function addDays(d, n)     { const r = new Date(d); r.setDate(r.getDate() + n); return r; }

function isHorseInjured(horseId) {
  const h = getHorse(horseId);
  return h && h.injured === true;
}

function isHorseBookedOnDate(horseId, dateStr, bookings) {
  return bookings.some(b => b.horse_id === horseId && b.date === dateStr);
}

function canBookHorse(horseId, dateStr, bookings) {
  if (isHorseInjured(horseId)) return { allowed: false, reason: 'injured' };
  if (isHorseBookedOnDate(horseId, dateStr, bookings)) return { allowed: false, reason: 'already-booked' };
  return { allowed: true, reason: null };
}

function getRidersForHorse(horseId, riderHorses, riders) {
  const riderIds = riderHorses.filter(rh => rh.horse_id === horseId).map(rh => rh.rider_id);
  return riderIds.map(id => riders.find(r => r.id === id)).filter(Boolean);
}

function getHorsesForRider(riderId, riderHorses, horses) {
  const horseIds = riderHorses.filter(rh => rh.rider_id === riderId).map(rh => rh.horse_id);
  return horseIds.map(id => horses.find(h => h.id === id)).filter(Boolean);
}

function getUnriddenHorses(dateStr, horses, bookings) {
  return horses.filter(h => !h.injured && !isHorseBookedOnDate(h.id, dateStr, bookings));
}

function isTrainerAvailable(dateStr, timeStr, schedules) {
  if (!dateStr || !timeStr) return { available: false, trainers: [] };
  const d = new Date(dateStr + 'T12:00:00');
  const dayName = days[d.getDay()];
  const available = schedules.filter(s => {
    if (s.day_of_week !== dayName) return false;
    return timeStr >= s.start_time && timeStr < s.end_time;
  });
  return { available: available.length > 0, trainers: [...new Set(available.map(s => s.trainer_name))] };
}

function canMarkInjured(horse, currentUserEmail, currentRole) {
  if (currentRole === 'staff') return true;
  const owner = getOwner(horse.owner_id);
  return owner && owner.email === currentUserEmail;
}

function getVisiblePanels(role) {
  const base = ['home', 'calendar', 'horses', 'riders', 'bookings'];
  if (role === 'staff') return [...base, 'owners'];
  return base;
}

function canDeleteBooking(role) { return role === 'staff'; }
function canAddHorse(role)      { return role === 'staff'; }
function canViewOwners(role)    { return role === 'staff'; }
function canAddRider(role)      { return true; } // both roles


// ════════════════════════════════════════
// SUITE 1 — TRAINER SCHEDULE (carried over)
// ════════════════════════════════════════

test('Trainer Schedule', 'Colin available Monday at 14:00', () => {
  const r = isTrainerAvailable('2026-04-06', '14:00', mockSchedules);
  assert(r.available);
  assertContains(r.trainers, 'Colin');
});
test('Trainer Schedule', 'Janeen available Monday at 14:00', () => {
  const r = isTrainerAvailable('2026-04-06', '14:00', mockSchedules);
  assertContains(r.trainers, 'Janeen');
});
test('Trainer Schedule', 'Both trainers available Monday afternoon', () => {
  const r = isTrainerAvailable('2026-04-06', '15:00', mockSchedules);
  assertEquals(r.trainers.length, 2, 'Both trainers');
});
test('Trainer Schedule', 'No trainer available Monday morning at 09:00', () => {
  const r = isTrainerAvailable('2026-04-06', '09:00', mockSchedules);
  assert(!r.available);
});
test('Trainer Schedule', 'Colin NOT available on Friday', () => {
  const r = isTrainerAvailable('2026-04-10', '14:00', mockSchedules);
  assert(!r.trainers.includes('Colin'));
});
test('Trainer Schedule', 'Janeen available Saturday at 10:00', () => {
  const r = isTrainerAvailable('2026-04-11', '10:00', mockSchedules);
  assert(r.available);
  assertContains(r.trainers, 'Janeen');
});
test('Trainer Schedule', 'Janeen NOT available Saturday after 14:30', () => {
  const r = isTrainerAvailable('2026-04-11', '15:00', mockSchedules);
  assert(!r.available);
});
test('Trainer Schedule', 'Boundary: exactly at start time 13:00', () => {
  const r = isTrainerAvailable('2026-04-06', '13:00', mockSchedules);
  assert(r.available);
});
test('Trainer Schedule', 'Boundary: end time 18:00 is NOT available', () => {
  const r = isTrainerAvailable('2026-04-06', '18:00', mockSchedules);
  assert(!r.available);
});
test('Trainer Schedule', 'Handles missing date gracefully', () => {
  const r = isTrainerAvailable('', '14:00', mockSchedules);
  assert(!r.available);
});
test('Trainer Schedule', 'Handles missing time gracefully', () => {
  const r = isTrainerAvailable('2026-04-06', '', mockSchedules);
  assert(!r.available);
});


// ════════════════════════════════════════
// SUITE 2 — BOOKING TYPES (carried over)
// ════════════════════════════════════════

test('Booking Types', 'Lesson requires supervision', () => {
  assert(typeConfig['lesson'].supervised === true);
});
test('Booking Types', 'Arena supervised requires trainer', () => {
  assert(typeConfig['arena-supervised'].supervised === true);
});
test('Booking Types', 'Arena independent does NOT require trainer', () => {
  assert(typeConfig['arena-independent'].supervised === false);
});
test('Booking Types', 'Vet does NOT require trainer', () => {
  assert(typeConfig['vet'].supervised === false);
});
test('Booking Types', 'All 6 booking types defined', () => {
  ['lesson','arena-supervised','arena-independent','vet','farrier','competition']
    .forEach(t => assert(typeConfig[t], `"${t}" should be defined`));
});


// ════════════════════════════════════════
// SUITE 3 — ROLE-BASED ACCESS
// ════════════════════════════════════════

test('Role Access', 'Staff sees owners panel', () => {
  assertContains(getVisiblePanels('staff'), 'owners');
});
test('Role Access', 'Owner cannot see owners panel', () => {
  assert(!getVisiblePanels('owner').includes('owners'));
});
test('Role Access', 'Both roles see riders panel', () => {
  assertContains(getVisiblePanels('staff'), 'riders');
  assertContains(getVisiblePanels('owner'), 'riders');
});
test('Role Access', 'Both roles can add riders', () => {
  assert(canAddRider('staff'));
  assert(canAddRider('owner'));
});
test('Role Access', 'Staff can delete bookings', () => {
  assert(canDeleteBooking('staff'));
});
test('Role Access', 'Owner cannot delete bookings', () => {
  assert(!canDeleteBooking('owner'));
});
test('Role Access', 'Staff can add horses', () => {
  assert(canAddHorse('staff'));
});
test('Role Access', 'Owner cannot add horses', () => {
  assert(!canAddHorse('owner'));
});
test('Role Access', 'Both roles can view horses', () => {
  assertContains(getVisiblePanels('staff'), 'horses');
  assertContains(getVisiblePanels('owner'), 'horses');
});


// ════════════════════════════════════════
// SUITE 4 — INJURY SYSTEM
// ════════════════════════════════════════

test('Injury System', 'Shadow is marked injured', () => {
  assert(isHorseInjured(3), 'Shadow should be injured');
});
test('Injury System', 'Thunder is NOT injured', () => {
  assert(!isHorseInjured(1), 'Thunder should not be injured');
});
test('Injury System', 'Unknown horse id returns false', () => {
  assert(!isHorseInjured(999), 'Unknown horse should not be injured');
});
test('Injury System', 'Staff can mark any horse injured', () => {
  const horse = getHorse(1);
  assert(canMarkInjured(horse, 'anyone@example.com', 'staff'));
});
test('Injury System', "Owner can mark their own horse injured", () => {
  const horse = getHorse(1); // owned by Emily (owner_id:1)
  assert(canMarkInjured(horse, 'emily@example.com', 'owner'));
});
test('Injury System', "Owner cannot mark someone else's horse injured", () => {
  const horse = getHorse(1); // owned by Emily
  assert(!canMarkInjured(horse, 'james@example.com', 'owner'), 'James cannot mark Emily\'s horse');
});
test('Injury System', 'Injured horse cannot be booked', () => {
  const r = canBookHorse(3, TODAY, mockBookings); // Shadow is injured
  assert(!r.allowed);
  assertEquals(r.reason, 'injured');
});
test('Injury System', 'Injury flag defaults to false on new horses', () => {
  const newHorse = { id:99, name:'NewHorse', injured: false };
  assert(!newHorse.injured);
});
test('Injury System', 'Clearing injury allows booking again', () => {
  const cleared = { ...getHorse(3), injured: false };
  const horses = [...mockHorses.filter(h => h.id !== 3), cleared];
  function isInjured(id) { return horses.find(h => h.id === id)?.injured === true; }
  assert(!isInjured(3), 'Shadow should no longer be injured');
});


// ════════════════════════════════════════
// SUITE 5 — ONE RIDE PER DAY RULE
// ════════════════════════════════════════

test('One Ride Per Day', 'Thunder already booked today — blocked', () => {
  const r = canBookHorse(1, TODAY, mockBookings);
  assert(!r.allowed);
  assertEquals(r.reason, 'already-booked');
});
test('One Ride Per Day', 'Estella not booked today — allowed', () => {
  // Estella (id:4) has a booking tomorrow, not today
  const r = canBookHorse(4, TODAY, mockBookings);
  assert(r.allowed);
});
test('One Ride Per Day', 'Thunder can be booked on a different day', () => {
  const r = canBookHorse(1, '2026-04-08', mockBookings);
  assert(r.allowed);
});
test('One Ride Per Day', 'Booking on same date but different horse is fine', () => {
  const r = canBookHorse(4, TODAY, mockBookings);
  assert(r.allowed, 'Estella is available today');
});
test('One Ride Per Day', 'Injured horse blocked even if not booked', () => {
  // Shadow (id:3) has no booking but is injured
  const r = canBookHorse(3, TODAY, mockBookings);
  assert(!r.allowed);
  assertEquals(r.reason, 'injured');
});
test('One Ride Per Day', 'getUnriddenHorses excludes injured and booked', () => {
  const unridden = getUnriddenHorses(TODAY, mockHorses, mockBookings);
  // Thunder(1) booked, Bella(2) booked, Shadow(3) injured → only Estella(4)
  assertEquals(unridden.length, 1, 'Only Estella unridden');
  assertEquals(unridden[0].name, 'Estella');
});
test('One Ride Per Day', 'getUnriddenHorses returns all when no bookings', () => {
  const unridden = getUnriddenHorses('2099-01-01', mockHorses, mockBookings);
  // All non-injured horses: Thunder, Bella, Estella (3 — Shadow injured)
  assertEquals(unridden.length, 3, '3 horses need riding');
});
test('One Ride Per Day', 'getUnriddenHorses handles empty horses array', () => {
  const unridden = getUnriddenHorses(TODAY, [], mockBookings);
  assertEquals(unridden.length, 0);
});


// ════════════════════════════════════════
// SUITE 6 — RIDERS
// ════════════════════════════════════════

test('Riders', 'All 5 riding levels are defined', () => {
  ['lead-line','walk-trot','canter','jump','competition']
    .forEach(l => assert(levelConfig[l], `Level "${l}" should be defined`));
});
test('Riders', 'Both membership types valid', () => {
  assert(['monthly','annual'].includes('monthly'));
  assert(['monthly','annual'].includes('annual'));
});
test('Riders', 'getRider returns correct rider by id', () => {
  const r = getRider(1);
  assertEquals(r.first, 'Alex');
});
test('Riders', 'getRider returns undefined for unknown id', () => {
  assert(getRider(999) === undefined);
});
test('Riders', 'Rider has required fields', () => {
  mockRiders.forEach(r => {
    assert(r.first, `${r.id} missing first`);
    assert(r.last,  `${r.id} missing last`);
    assert(r.level, `${r.id} missing level`);
    assert(r.membership, `${r.id} missing membership`);
  });
});
test('Riders', 'Rider with no owner is valid', () => {
  // Riders are independent of owners — no owner_id needed
  const r = mockRiders[0];
  assert(!('owner_id' in r), 'Riders do not have owner_id');
});


// ════════════════════════════════════════
// SUITE 7 — RIDER-HORSE ASSIGNMENTS
// ════════════════════════════════════════

test('Rider-Horse', 'Alex is assigned to Thunder and Bella', () => {
  const horses = getHorsesForRider(1, mockRiderHorses, mockHorses);
  assertEquals(horses.length, 2);
  assert(horses.find(h => h.name === 'Thunder'));
  assert(horses.find(h => h.name === 'Bella'));
});
test('Rider-Horse', 'Sam is assigned to Thunder only', () => {
  const horses = getHorsesForRider(2, mockRiderHorses, mockHorses);
  assertEquals(horses.length, 1);
  assertEquals(horses[0].name, 'Thunder');
});
test('Rider-Horse', 'Casey is assigned to Estella only', () => {
  const horses = getHorsesForRider(3, mockRiderHorses, mockHorses);
  assertEquals(horses.length, 1);
  assertEquals(horses[0].name, 'Estella');
});
test('Rider-Horse', 'Jordan has no horses assigned', () => {
  const horses = getHorsesForRider(4, mockRiderHorses, mockHorses);
  assertEquals(horses.length, 0);
});
test('Rider-Horse', 'Thunder has two assigned riders', () => {
  const riders = getRidersForHorse(1, mockRiderHorses, mockRiders);
  assertEquals(riders.length, 2);
  assert(riders.find(r => r.first === 'Alex'));
  assert(riders.find(r => r.first === 'Sam'));
});
test('Rider-Horse', 'Rider with no assignments returns empty array', () => {
  const horses = getHorsesForRider(999, mockRiderHorses, mockHorses);
  assertEquals(horses.length, 0);
});
test('Rider-Horse', 'Rider can be assigned to multiple horses', () => {
  const horses = getHorsesForRider(1, mockRiderHorses, mockHorses);
  assert(horses.length > 1, 'Alex should have multiple horses');
});
test('Rider-Horse', 'Horse can have multiple riders', () => {
  const riders = getRidersForHorse(1, mockRiderHorses, mockRiders);
  assert(riders.length > 1, 'Thunder should have multiple riders');
});


// ════════════════════════════════════════
// SUITE 8 — BOOKINGS WITH RIDERS
// ════════════════════════════════════════

test('Bookings + Riders', 'Booking can have a rider assigned', () => {
  const b = mockBookings[0];
  assert(b.rider_id !== null && b.rider_id !== undefined);
  const r = getRider(b.rider_id);
  assert(r, 'Should resolve to a rider');
  assertEquals(r.first, 'Alex');
});
test('Bookings + Riders', 'Booking can have no rider (null rider_id)', () => {
  const b = mockBookings[2]; // vet booking — no rider
  assert(b.rider_id === null || b.rider_id === undefined);
});
test('Bookings + Riders', 'Booking display shows rider name when present', () => {
  const b = mockBookings[0];
  const r = getRider(b.rider_id);
  const display = r ? `${r.first} ${r.last}` : '';
  assertEquals(display, 'Alex Taylor');
});
test('Bookings + Riders', 'Booking display falls back gracefully when no rider', () => {
  const b = mockBookings[2];
  const r = getRider(b.rider_id);
  const display = r ? `${r.first} ${r.last}` : '—';
  assertEquals(display, '—');
});


// ════════════════════════════════════════
// SUITE 9 — DATA HELPERS
// ════════════════════════════════════════

test('Data Helpers', 'getHorse returns correct horse', () => {
  assertEquals(getHorse(1).name, 'Thunder');
});
test('Data Helpers', 'getHorse returns undefined for unknown', () => {
  assert(getHorse(999) === undefined);
});
test('Data Helpers', 'getOwnerByHorse returns correct owner', () => {
  assertEquals(getOwnerByHorse(1).first, 'Emily');
});
test('Data Helpers', 'fmtDate formats correctly', () => {
  assertEquals(fmtDate(new Date('2026-04-06T12:00:00')), '2026-04-06');
});
test('Data Helpers', 'addDays crosses month boundary', () => {
  assertEquals(fmtDate(addDays(new Date('2026-04-28T12:00:00'), 5)), '2026-05-03');
});
test('Data Loading', 'All 11 expected horses present', () => {
  const names = ['Estella','Cruz','Jones','Chase','Freja','Maybelle','Peaches','Lucca','Daisy','Ben','Estro'];
  const data = names.map((name,i) => ({id:i+1, name, injured:false}));
  assertEquals(data.length, 11);
  names.forEach(n => assert(data.find(h => h.name === n), `${n} should exist`));
});
test('Data Loading', 'Missing user profile defaults to owner role', () => {
  const profile = null;
  assertEquals(profile?.role || 'owner', 'owner');
});
test('Data Loading', 'Staff profile resolves correctly', () => {
  assertEquals({ role:'staff' }?.role || 'owner', 'staff');
});


// ════════════════════════════════════════
// SUITE 10 — AUTH (carried over)
// ════════════════════════════════════════

test('Auth', 'Valid email accepted', () => {
  assert('test@example.com'.includes('@'));
});
test('Auth', 'Invalid email rejected', () => {
  assert(!'notanemail'.includes('@'));
});
test('Auth', 'Staff role grants full access', () => {
  assert(canViewOwners('staff'));
  assert(canDeleteBooking('staff'));
  assert(canAddHorse('staff'));
});
test('Auth', 'Owner role has restricted access', () => {
  assert(!canViewOwners('owner'));
  assert(!canDeleteBooking('owner'));
  assert(!canAddHorse('owner'));
});
test('Auth', 'Default role falls back to owner', () => {
  assertEquals(undefined || 'owner', 'owner');
});
test('Magic Link Flow', 'App shows splash when no session', () => {

  const go = name => { screen = name; };
  if (!null) go('splash');
  assertEquals(screen, 'splash');
});
test('Magic Link Flow', 'App shows app when valid session', () => {

// RUNNER
// ════════════════════════════════════════

async function runAll() {
  const container = document.getElementById('results');
  container.innerHTML = '<div style="color:#888;padding:16px 0">Running tests...</div>';
  let passed = 0, failed = 0;
  const suites = {};

  for (const t of results) {
    try {
      await t.fn();
      t.status = 'pass'; passed++;
    } catch(e) {
      t.status = 'fail'; t.error = e.message; failed++;
    }
    if (!suites[t.suite]) suites[t.suite] = [];
    suites[t.suite].push(t);
  }

  let html = '';
  for (const [suite, tests] of Object.entries(suites)) {
    const sp = tests.filter(t => t.status === 'pass').length;
    html += `<div class="suite">
      <div class="suite-title">${suite} <span style="color:#666;font-weight:normal;font-size:11px">${sp}/${tests.length} passed</span></div>
      ${tests.map(t => `
        <div class="test ${t.status}">
          <div class="indicator">${t.status==='pass'?'✓':'✗'}</div>
          <div>
            <div class="test-name">${t.name}</div>
            ${t.error?`<div class="test-error">${t.error}</div>`:''}
          </div>
        </div>`).join('')}
    </div>`;
  }

  html += `<div class="summary">
    <div><div class="sum-pass">${passed}</div><div class="sum-label">passed</div></div>
    <div><div class="sum-fail">${failed}</div><div class="sum-label">failed</div></div>
    <div style="margin-left:auto;font-size:12px;color:#888">${passed+failed} total · ${
      failed===0
        ? '<span style="color:#6db86d">All tests passing</span>'
        : `<span style="color:#e07070">${failed} test${failed!==1?'s':''} failing</span>`
    }</div>
  </div>`;

  container.innerHTML = html;
}

runAll();
</script>
